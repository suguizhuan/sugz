name: 靶点监控每日更新

on:
  schedule:
    # 每天 UTC 22:40 触发（北京时间次日 06:40），避开整点减轻上游 API 抖动
    - cron: "40 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kbd-monitor-daily-update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest target items
        run: python scripts/monitor_fetch.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain data/monitor.json)" ]]; then
            git config user.name "kbd-monitor-bot"
            git config user.email "kbd-monitor-bot@users.noreply.github.com"
            git add data/monitor.json
            git commit -m "chore(monitor): 每日自动抓取靶点动态 $(date -u +%Y-%m-%d)"
            git push origin HEAD:master
          else
            echo "No changes."
          fi
