name: PARP7 daily update

on:
  schedule:
    # 每天 UTC 03:17 触发（避开整点/半点，减轻上游 API 抖动）
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: parp7-daily-update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest PARP7 items
        run: python scripts/fetch_latest.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain data/updates.json news.html)" ]]; then
            git config user.name "parp7-daily-bot"
            git config user.email "parp7-daily-bot@users.noreply.github.com"
            git add data/updates.json news.html
            git commit -m "chore(daily): 更新 PARP7 最新进展 $(date -u +%Y-%m-%d)"
            git push origin HEAD:master
          else
            echo "No changes."
          fi
